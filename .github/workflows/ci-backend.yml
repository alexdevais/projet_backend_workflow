name: Java CI/CD with Docker

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # ==========================================
  # JOB 1 : LA COMPILATION (BUILD)
  # ==========================================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # On compile uniquement l'application (par exemple la phase 'build' du Dockerfile)
      - name: Build Docker Image
        run: |
          docker compose build --no-cache backend

  # ==========================================
  # JOB 2 : L'EXÉCUTION DES TESTS
  # ==========================================
  test:
    runs-on: ubuntu-latest
    needs: build # 💡 Bloque les tests si la compilation (Build) échoue
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create temporary .env file
        run: |
          echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
          echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env

      # On lance l'environnement complet pour exécuter les tests unitaires / intégration
      - name: Run tests via Docker Compose
        run: |
            docker compose run backend ./gradlew test

      - name: Clean up Docker
        run: |
          docker compose down -v

  # ==========================================
  # JOB 3 : LE SIMULACRE DE DÉPLOIEMENT
  # ==========================================
  deploy:
    runs-on: ubuntu-latest
    needs: test # 💡 Bloque le déploiement si un seul test échoue
    steps:
      - name: Simuler le déploiement Docker
        run: |
          echo "🔐 Connexion SSH virtuelle..."
          echo "🐳 Arrêt de l'ancienne version..."
          echo "🚀 Lancement de la nouvelle stack (Backend + MySQL + Uptime Kuma)..."
          echo "🟢 DÉPLOIEMENT TERMINÉ AVEC SUCCÈS !"