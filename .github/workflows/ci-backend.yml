name: Java CI/CD with Docker

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code du dépôt
      - name: Checkout code
        uses: actions/checkout@v6

      # 2. Configurer l'environnement Docker Buildx (pour une gestion avancée du cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Créer un fichier .env temporaire pour Docker Compose
      # GitHub Actions a besoin de ces variables pour valider la syntaxe du docker-compose.yml
      - name: Create temporary .env file
        run: |
          echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
          echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env

      # 4. Build des images et exécution des tests (grâce à ton Dockerfile multi-stage)
      - name: Build and Test with Docker Compose
        run: |
          docker compose build --no-cache

      # 5. Optionnel : Si tu veux vérifier que l'ensemble s'allume bien en CI
      - name: Verify Services Start
        run: |
          docker compose up -d
          # On attend un peu pour laisser le healthcheck de MySQL et Spring Boot passer
          sleep 30
          docker compose ps
          docker compose logs backend
      # 6. On vide les containers pour le test et de build
      - name: Empty docker
        run: |
          docker compose down -v
  # 7. Phase de déploiement
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simuler la connexion SSH
        run: |
          echo "🔐 Connexion SSH réussie au serveur virtuel de production (ip: 192.168.1.100)..."
          sleep 2

      - name: Simuler la mise à jour du code (Git Pull)
        run: |
          echo "📥 Récupération de la dernière version depuis la branche ${{ github.ref_name }}..."
          sleep 2
          echo "✅ Code mis à jour avec succès."

      - name: Simuler le déploiement Docker
        run: |
          echo "🐳 Arrêt de l'ancienne stack Docker..."
          echo "🚀 Lancement de Docker Compose (Backend + MySQL + Uptime Kuma)..."
          sleep 3
          echo "🟢 APPLICATION EN LIGNE ET SÉCURISÉE !"

